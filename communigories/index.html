    <script>
		(function() {
			const isBot = /bot|googlebot|crawler|spider|robot|crawling/i.test(navigator.userAgent);
			if (isBot) return; 
			
			const favicon = document.getElementById('dynamic-favicon');
			if (!favicon) return;

			let iconToLoad = "https://impostiq.github.io/images/favicon192.png";
			
			const getSeasonalInfo = () => {
				const now = new Date();
				const month = now.getMonth() + 1;
				const day = now.getDate();
				
				if ((month === 10 && day >= 24) || (month === 11 && day <= 7)) return 'halloween';
				if ((month === 12 && day >= 18) || (month === 1 && day <= 1)) return 'christmas';
				return 'default';
			};

			const season = getSeasonalInfo();
			
			if (season !== 'default') {
				const cacheBuster = "?v=" + season + "-" + new Date().getFullYear(); 
				const images = {
					christmas: "https://icons.iconarchive.com/icons/microsoft/fluentui-emoji-3d/1024/Snowman-3d-icon.png",
					halloween: "https://icons.iconarchive.com/icons/microsoft/fluentui-emoji-3d/1024/Jack-O-Lantern-3d-icon.png"
				};
				if (images[season]) {
					iconToLoad = images[season] + cacheBuster;
				}
			}

			favicon.href = iconToLoad;
		})();
	</script>

            useEffect(() => {
                const el = containerRef.current;
                const txt = textRef.current;
                if (!el || !txt) return;

                const check = () => {
                    const textWidth = txt.scrollWidth;
                    const containerWidth = el.clientWidth;
                    
                    if (containerWidth === 0) {
                        setIsOverflowing(false);
                        return;
                    }
                    
                    const isOverflow = textWidth + 4 > containerWidth;
                    setIsOverflowing(isOverflow);

                    if (isOverflow) {
                        const calculatedGap = Math.max(24, containerWidth - (textWidth * 0.85));
                        setGap(calculatedGap);
                    }

                    check();
                });

        const LazyImage = ({ src, className, sizeClassName = "w-full h-full", spinnerSize = "w-7 h-7 sm:w-8 sm:h-8", purpleSpinner = false, alt = "" }) => {
            const isCached = globalImageCache.has(src);
            const isFailedCached = globalImageErrorCache.has(src);
            const [loaded, setLoaded] = React.useState(isCached || isFailedCached);
            const [hasError, setHasError] = React.useState(isFailedCached);
            const [shouldAnimate, setShouldAnimate] = React.useState(!isCached);

            React.useEffect(() => {
                if (globalImageCache.has(src)) {
                    setLoaded(true);
                    setHasError(false);
                    setShouldAnimate(false);
                    return;
                }
                if (globalImageErrorCache.has(src)) {
                    setLoaded(true);
                    setHasError(true);
                    setShouldAnimate(false);
                    return;
                }
                setLoaded(false);
                setHasError(false);
                setShouldAnimate(true);

                const img = new Image();
                let resolved = false;

                const handleLoad = () => {
                    if (resolved) return;
                    resolved = true;
                    setTimeout(() => {
                        globalImageCache.add(src);
                        setLoaded(true);
                        setHasError(false);
                    }, 250);
                };

                const handleError = () => {
                    if (resolved) return;
                    resolved = true;
                    globalImageErrorCache.add(src);
                    setHasError(true);
                    setLoaded(true);
                };

                img.onload = handleLoad;
                img.onerror = handleError;
                img.src = src;

                if (img.complete) {
                    if (img.naturalWidth !== 0) {
                        handleLoad();
                    } else {
                        handleError();
                    }
                }
            }, [src]);

            const spinnerColorClass = purpleSpinner ? "text-brand-500" : "text-white/40";

            const isCurrentlyCached = globalImageCache.has(src);

            const showLoader = !isCurrentlyCached && !isCurrentlyFailed && !loaded;

							</svg>
						</div>

                        <img 
                            src={src} 
                            className={`${className} ${(shouldAnimate && !isCurrentlyCached) ? 'animate-fade-in' : ''}`} 
                            alt={alt}

		const formatNumber = (num) => {
            if (!num || isNaN(num)) return '0';
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
            }
            if (num >= 1000) {
                return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
            }
            return num.toString();
        };

        const smartCapitalize = (str) => {
			if (!str) return '';
			
			const minorWords = new Set([
				'and', 'or', 'nor', 'but', 'a', 'an', 'the', 'as', 'at', 'by', 
				'for', 'in', 'of', 'on', 'per', 'to', 'with', 'from', 'into', 'vs', 'vs.'
			]);

			const capitalizeToken = (word, isFirstWord) => {
				if (!word) return '';

				const hasInternalUppercase = /[a-zA-Z]/.test(word) && word.slice(1).search(/[A-Z]/) !== -1;
				const isAllUppercase = word === word.toUpperCase() && /[a-zA-Z]/.test(word);

				if (hasInternalUppercase || isAllUppercase) {
					return word;
				}

				const lowerWord = word.toLowerCase();
				if (minorWords.has(lowerWord) && !isFirstWord) {
					return lowerWord;
				}

				return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
			};

			const processWordCompound = (word, isFirstWord) => {
				if (!word) return '';

				if (word.includes('/')) {
					return word.split('/')
						.map((subWord, index) => processWordCompound(subWord, isFirstWord && index === 0))
						.join('/');
				}

				if (word.includes('-')) {
					return word.split('-')
						.map((subWord, index) => processWordCompound(subWord, isFirstWord && index === 0))
						.join('-');
				}

				return capitalizeToken(word, isFirstWord);
			};

			return str.trim().split(/\s+/).map((word, index) => {
				return processWordCompound(word, index === 0);
			}).join(' ');
		};

            const getMyIds = () => { try { return JSON.parse(localStorage.getItem('my_communigories') || '[]'); } catch { return []; } };
            const saveMyId = (id) => { const ids = getMyIds(); if (!ids.includes(id)) localStorage.setItem('my_communigories', JSON.stringify([...ids, id])); };
            const removeMyId = (id) => { const ids = getMyIds(); localStorage.setItem('my_communigories', JSON.stringify(ids.filter(i => i !== id))); };

            const getSavedIds = () => { try { return Object.keys(JSON.parse(localStorage.getItem('saved_communigories') || '{}')); } catch { return []; } };

            const fetchTrendingData = async () => {
                const query = db.collection('communigories')
                    .where('isPrivate', '==', false)
                    .orderBy('downloads', 'desc')
                    .limit(500);
                const snapshot = await query.get();
                return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            };

            const fetchNewestData = async () => {
                const query = db.collection('communigories')
                    .where('isPrivate', '==', false)
                    .orderBy('createdAt', 'desc')
                    .limit(500);
                const snapshot = await query.get();
                return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            };

            const fetchMyCategoriesData = async () => {
                const myIds = getMyIds();
                const savedIds = getSavedIds();
                const allRelevantIds = [...new Set([...myIds, ...savedIds])];

                if (allRelevantIds.length > 0) {
                    const docPromises = allRelevantIds.map(id => db.collection('communigories').doc(id).get());
                    const docSnaps = await Promise.all(docPromises);
                    
                    const deletedIds = docSnaps.filter(snap => !snap.exists).map(snap => snap.id);
                    
                    if (deletedIds.length > 0) {
                        const savedComms = JSON.parse(localStorage.getItem('saved_communigories') || '{}');
                        let changed = false;
                        deletedIds.forEach(id => {
                            if (savedComms[id]) {
                                delete savedComms[id];
                                changed = true;
                            }
                            removeMyId(id); 
                        });
                        if (changed) {
                            localStorage.setItem('saved_communigories', JSON.stringify(savedComms));
                            window.dispatchEvent(new Event('storage'));
                        }
                    }
                    
                    const savedComms = JSON.parse(localStorage.getItem('saved_communigories') || '{}');
                    const onlineData = docSnaps.filter(snap => snap.exists).map(doc => {
                        const localData = savedComms[doc.id] || {};
                        return { 
                            id: doc.id, 
                            ...doc.data(), 
                            savedAt: localData.savedAt || (doc.data().createdAt?.toDate ? doc.data().createdAt.toDate().getTime() : 0)
                        };
                    });
                    const onlineIds = onlineData.map(c => c.id);
                    
                    const savedData = Object.values(savedComms)
                        .filter(s => !onlineIds.includes(s.id))
                        .map(s => ({ ...s, savedAt: s.savedAt || 0 }));
                        
                    const combined = [...onlineData, ...savedData];
                    combined.sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0));
                    return combined;
                }
                return [];
            };

            const fetchCategories = async (filterToFetch) => {
                activeFetchRef.current = filterToFetch;
                const hasCache = categoriesCache[filterToFetch];
                
                if (hasCache) {
                    setCategories(categoriesCache[filterToFetch]);
                    setIsFetchingCategories(false);
                    return;
                } else {
                    setCategories([]); 
                    setIsFetchingCategories(true);
                }

                const fetchStartTime = Date.now();

                try {
                    const isInitialLoad = !categoriesCache.trending && !categoriesCache.newest && !categoriesCache.my_categories;

                    let results;
                    if (isInitialLoad) {
                        const [trending, newest, my_categories] = await Promise.all([
                            fetchTrendingData().catch(err => { console.error(err); return []; }),
                            fetchNewestData().catch(err => { console.error(err); return []; }),
                            fetchMyCategoriesData().catch(err => { console.error(err); return []; })
                        ]);

                        if (activeFetchRef.current !== filterToFetch) return;

                        const newCache = { trending, newest, my_categories };
                        setCategoriesCache(newCache);
                        results = newCache[filterToFetch];
                    } else {
                        if (filterToFetch === 'my_categories') {
                            results = await fetchMyCategoriesData();
                        } else if (filterToFetch === 'trending') {
                            results = await fetchTrendingData();
                        } else if (filterToFetch === 'newest') {
                            results = await fetchNewestData();
                        }

                        if (activeFetchRef.current !== filterToFetch) return;

                        setCategoriesCache(prev => ({ ...prev, [filterToFetch]: results }));
                    }

                    const elapsed = Date.now() - fetchStartTime;
                    const minTime = 600;
                    if (elapsed < minTime) {
                        await new Promise(resolve => setTimeout(resolve, minTime - elapsed));
                    }

                    if (activeFetchRef.current === filterToFetch) {
                        setCategories(results);
                    }
                } catch (e) { 
                    console.error("Fetch Error:", e);
                    if (activeFetchRef.current === filterToFetch) {
                        setAlert({ title: 'Connection Lost', message: 'Failed to load community categories. Check your internet connection.', type: 'error' }); 
                    }

                    if (activeFetchRef.current === filterToFetch) {
                        setIsFetchingCategories(false);
                    }
                }

                        console.error(e);
                        setIsFetchingCategories(false);
                    });

            }, []);

            useEffect(() => {

                    setCategories([]);
                    setIsFetchingCategories(true);

                setActiveFilter(newFilter);

            const displayedCategories = React.useMemo(() => {
                if (!searchQuery) return categories;
                return categories.filter(c => c.name.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [categories, searchQuery]);

            
			const handleUpload = async () => {
            if (!newCatName.trim()) { setError('Category name is required.'); return; }
            if (/\p{Extended_Pictographic}/u.test(newCatName)) { setError('Category name cannot contain emojis.'); return; }
                
                const splitRegex = /,(?![^{]*\})/;
                const wordsArray = newCatWords.split(splitRegex)
                    .map(w => w.trim().replace(/^\{(.*)\}$/, '$1').trim())
                    .filter(w => w.length > 0);
                
                const lowerCaseWords = wordsArray.map(w => w.toLowerCase());
                const duplicates = wordsArray.filter((item, index) => lowerCaseWords.indexOf(item.toLowerCase()) !== index);
                const uniqueDuplicates =[...new Set(duplicates)];
                
                if (uniqueDuplicates.length > 0) { 
                    setError(`Remove duplicate words: ${uniqueDuplicates.join(', ')}`); 
                    return; 
                }
                
                if (wordsArray.length < 10) { setError('Please add at least 10 words.'); return; }

                setIsUploading(true);
                try {
                    const capitalizedName = smartCapitalize(newCatName);
                    const payload = { name: capitalizedName, words: wordsArray, icon: selectedIcon, isPrivate };
                    
                    if (editId) {
                        payload.edits = firebase.firestore.FieldValue.increment(1);
                        await db.collection('communigories').doc(editId).update(payload);
                        
                        const savedComms = JSON.parse(localStorage.getItem('saved_communigories') || '{}');
                        if (savedComms[editId]) {
                            savedComms[editId] = {
                                ...savedComms[editId],
                                name: capitalizedName,
                                icon: selectedIcon,
                                words: wordsArray
                            };
                            localStorage.setItem('saved_communigories', JSON.stringify(savedComms));
                            window.dispatchEvent(new Event('storage'));
                        }

                        setCategories(prev => prev.map(c => c.id === editId ? { ...c, ...payload, edits: (c.edits || 0) + 1 } : c));
                        setCategoriesCache(prev => {
                            const updateArr = (arr) => arr ? arr.map(c => c.id === editId ? { ...c, ...payload, edits: (c.edits || 0) + 1 } : c) : null;
                            return { trending: updateArr(prev.trending), newest: updateArr(prev.newest), my_categories: updateArr(prev.my_categories) };
                        });
                        
                        setAlert({ title: 'Success', message: 'Category updated successfully!', type: 'success' });
                    } else {
                        const newDocId = generateCategoryId();
                        payload.downloads = 0;
                        payload.edits = 0;
                        payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                        await db.collection('communigories').doc(newDocId).set(payload);
                        
                        saveMyId(newDocId);
                        
                        const savedComms = JSON.parse(localStorage.getItem('saved_communigories') || '{}');
                        savedComms[newDocId] = { id: newDocId, name: payload.name, icon: payload.icon, words: payload.words, useLocal: true, useOnline: true, savedAt: Date.now() };
                        localStorage.setItem('saved_communigories', JSON.stringify(savedComms));
                        
                        let downloaded = [];
                        try { downloaded = JSON.parse(localStorage.getItem('downloaded_tracker') || '[]'); } catch(e){}
                        if (!Array.isArray(downloaded)) downloaded = [];
                        
                        if (!downloaded.includes(newDocId)) {
                            downloaded.push(newDocId);
                            localStorage.setItem('downloaded_tracker', JSON.stringify(downloaded));
                        }
                        window.dispatchEvent(new Event('storage'));
                        
                        setAlert({ title: 'Uploaded!', message: 'Your category is live and saved to your device.', type: 'success' });
                    }
					
                    if (!editId) {
                        setCategoriesCache(prev => ({ ...prev, my_categories: null, newest: null }));
                    }
                    
                    setActiveView('browse');
                    setActiveFilter(editId ? activeFilter : 'my_categories');
                    setNewCatName(''); setNewCatWords(''); setIsPrivate(false); setEditId(null);
                } catch (e) { setAlert({ title: 'Error', message: 'Failed to upload category.', type: 'error' }); }
                setIsUploading(false);
            };

            const triggerEdit = (cat) => {
                setEditId(cat.id);
                setNewCatName(cat.name);
                setNewCatWords(cat.words.join(', '));
                setSelectedIcon(cat.icon || ICONS_LIST[0].url);
                setIsPrivate(cat.isPrivate || false);
                setSelectedCategory(null);
                setActiveView('upload');
            };

            const executeDelete = async () => {
                if (!confirmDelete) return;
                const { id, global } = confirmDelete;
                try {
                    if (global) {
                        await db.collection('communigories').doc(id).delete();
                        removeMyId(id);
                        
                        setCategories(prev => prev.filter(c => c.id !== id));
                        setCategoriesCache(prev => {
                            const filterArr = (arr) => arr ? arr.filter(c => c.id !== id) : null;
                            return {
                                trending: filterArr(prev.trending),
                                newest: filterArr(prev.newest),
                                my_categories: filterArr(prev.my_categories)
                            };
                        });
                    } else {
                        if (activeFilter === 'my_categories') {
                            setCategories(prev => prev.filter(c => c.id !== id));
                        }
                        setCategoriesCache(prev => ({
                            ...prev,
                            my_categories: prev.my_categories ? prev.my_categories.filter(c => c.id !== id) : null
                        }));
                    }
                    
                    const savedComms = JSON.parse(localStorage.getItem('saved_communigories') || '{}');
                    if (savedComms[id]) {
                        delete savedComms[id];
                        localStorage.setItem('saved_communigories', JSON.stringify(savedComms));
                        window.dispatchEvent(new Event('storage'));
                    }
                    
                    setAlert({ title: global ? 'Deleted' : 'Removed', message: global ? 'Category deleted from community successfully.' : 'Category removed from your library.', type: 'success' });
                    setConfirmDelete(null);
                    setSelectedCategory(null);
                } catch (e) { setAlert({ title: 'Error', message: 'Failed to delete category.', type: 'error' }); }
            };

            const handleAddToLibrary = async (cat) => {
                const savedComms = JSON.parse(localStorage.getItem('saved_communigories') || '{}');
                savedComms[cat.id] = { id: cat.id, name: cat.name, icon: cat.icon, words: cat.words, useLocal: true, useOnline: true, savedAt: Date.now() };
                localStorage.setItem('saved_communigories', JSON.stringify(savedComms));
                
                let downloaded = [];
                try { downloaded = JSON.parse(localStorage.getItem('downloaded_tracker') || '[]'); } catch(e){}
                if (!Array.isArray(downloaded)) downloaded = [];
                
                let newDownloadsCount = typeof cat.downloads === 'number' ? cat.downloads : 0;

                if (!downloaded.includes(cat.id)) {
                    downloaded.push(cat.id);
                    localStorage.setItem('downloaded_tracker', JSON.stringify(downloaded));
                    newDownloadsCount += 1;
                    try {
                        await db.collection('communigories').doc(cat.id).update({
                            downloads: firebase.firestore.FieldValue.increment(1)
                        });
                    } catch(e) {}
                }
                
                window.dispatchEvent(new Event('storage'));
                
                setCategories(prev => prev.map(c => c.id === cat.id ? { ...c, downloads: newDownloadsCount } : c));
                setCategoriesCache(prev => {
                    const updateArr = (arr) => arr ? arr.map(c => c.id === cat.id ? { ...c, downloads: newDownloadsCount } : c) : null;
                    return {
                        trending: updateArr(prev.trending),
                        newest: updateArr(prev.newest),
                        my_categories: null

                const savedComms = JSON.parse(localStorage.getItem('saved_communigories') || '{}');

                    const currentValue = savedComms[catId][setting] !== false;
                    savedComms[catId][setting] = !currentValue;

                    iconUrl: cat.icon

            const currentWordCount = currentWordsArray.length;

                const parts = newCatWords.split(splitWithCommaRegex);
                const seenWords = new Set();
                
                return parts.map((part, i) => {

                    const actualWord = part.trim().replace(/^\{(.*)\}$/, '$1').trim().toLowerCase();
                    
                    if (actualWord.length > 0) {
                        if (seenWords.has(actualWord)) {
                            return <span key={i} className="text-red-400">{part}</span>;
                        } else {
                            seenWords.add(actualWord);
                            return <span key={i} className="text-white">{part}</span>;
                        }

                    return <span key={i} className="text-white">{part}</span>;

                                                            key={cat.id} 
                                                            onClick={() => { playSound('openInfo'); setSelectedCategory(cat); }}
                                                            className="relative overflow-hidden flex flex-col items-center rounded-[1.5rem] transition-transform duration-200 group h-[133px] border bg-slate-800/40 border-white/5 hover:bg-white/5 hover:border-white/5 backdrop-blur-md active:scale-95"
                                                        >
                                                            {!cat.isPrivate ? (
                                                                <div className="w-full text-center py-2 bg-black/50 border-b border-white/5">
                                                                    <div className="flex justify-center items-center gap-4 text-[10px] font-bold text-white/60 tracking-wider">
                                                                        <span className="flex items-center gap-1.5"><FaIcon name="icon-download" className="text-white/60" /> {formatNumber(cat.downloads || 0)}</span>
                                                                        <span className="flex items-center gap-1.5"><FaIcon name="icon-words" className="text-white/60" /> {formatNumber(cat.words?.length || 0)}</span>
                                                                    </div>
                                                                </div>
                                                            ) : (
																<div className="w-full text-center py-2 bg-black/50 border-b border-white/5">
																	<div className="flex justify-center items-center gap-1.5 text-[10px] font-bold text-white/60 tracking-wider uppercase">
																		<FaIcon name="icon-lock" className="text-white/60 text-[13px]" /> Private
																	</div>
																</div>
															)}
                                                            
                                                            <div className="relative flex-1 w-full flex flex-col items-center justify-center gap-3 p-4">
                                                                <LazyImage 
																	src={cat.icon} 
																	sizeClassName="w-10 h-10" 
																	spinnerSize="w-6 h-6" 
																	className="w-full h-full object-contain transition-transform duration-300 drop-shadow-md opacity-100 group-hover:opacity-100 group-hover:scale-110" 
																/>
                                                                <OverflowMarquee text={smartCapitalize(cat.name)} className="text-xs font-bold tracking-wide text-white px-1" />
                                                            </div>
                                                        </button>
                                                    ))}
                                                </div>
                                                {displayedCategories.length >= 500 && (
													<div className="mt-8 mb-4 text-center animate-fadeIn">
														<div className="inline-flex items-center justify-center gap-2 px-4 py-2 rounded-xl bg-white/5 border border-white/5 shadow-sm">
															<span className="text-white/50 text-[11px] font-bold tracking-wide">
																Showing the top 500 results. Use search to find specific categories.
															</span>
														</div>
													</div>
												)}
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>

						<button 
							onClick={scrollToTop}
							className={`glass-btn fixed right-6 bottom-6 z-40 w-12 h-12 flex items-center justify-center bg-white/5 rounded-full text-white/50 hover:bg-white/10 hover:text-white active:scale-90 transition-transform duration-300 ${(showScrollTop && activeView === 'browse') ? 'translate-y-0 pointer-events-auto' : 'translate-y-24 pointer-events-none'}`}
						>
							<FaIcon name="icon-chevron-up" className="text-xl" />
						</button>

                        <div className={`fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-[#020617] via-[#020617] to-transparent z-50 ${activeView === 'upload' ? 'block' : 'hidden'}`}>
                            <div className="max-w-lg mx-auto pb-[env(safe-area-inset-bottom)]">
                                <button onClick={() => { playSound(); handleUpload(); }} disabled={isUploading}
                                    className="w-full h-[68px] flex items-center justify-center bg-white text-slate-950 font-display font-bold text-lg py-5 rounded-[1.5rem] disabled:opacity-50 disabled:shadow-none active:scale-[0.98] transition-transform duration-200"
                                >
                                    {isUploading ? (
                                        <div className="flex items-center justify-center gap-3">
                                            <svg className="sleek-spinner w-6 h-6 text-brand-500 drop-shadow-sm" viewBox="25 25 50 50"><circle cx="50" cy="50" r="20"></circle></svg>
                                            <span className="animate-pulse text-slate-950/80">{editId ? 'SAVING...' : 'UPLOADING...'}</span>
                                        </div>
                                    ) : (
											<span className="flex items-center gap-3">
												<FaIcon name={editId ? "icon-pen" : "icon-cloud-up-button"} className="text-[22px]" width="1.1em" /> 
												{editId ? "SAVE CHANGES" : "UPLOAD TO COMMUNITY"}
											</span>
										)}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
